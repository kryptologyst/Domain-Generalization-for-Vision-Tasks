# Default configuration for domain generalization
defaults:
  - _self_

# Model configuration
model:
  method: "dann"  # Options: dann, coral, mixstyle
  backbone: "resnet18"  # Options: resnet18, resnet50
  num_classes: 10
  feature_dim: 512
  pretrained: true
  alpha: 1.0  # Gradient reversal strength for DANN

# Data configuration
data:
  data_dir: "./data"
  batch_size: 32
  num_workers: 4
  image_size: 224
  augmentation_strength: "medium"  # Options: weak, medium, strong
  val_split: 0.2

# Training configuration
training:
  max_epochs: 100
  learning_rate: 0.001
  weight_decay: 1e-4
  optimizer: "adam"  # Options: adam, sgd, adamw
  scheduler: "step"  # Options: step, cosine, plateau, null
  step_size: 30
  gamma: 0.1
  patience: 10
  min_delta: 0.001

# Domain configuration
domains:
  source: ["cifar10", "svhn"]
  target: ["mnist", "fashion_mnist"]

# Logging configuration
logging:
  level: "INFO"
  log_dir: "./logs"
  use_wandb: false
  wandb_project: "domain-generalization"
  wandb_entity: null

# Evaluation configuration
evaluation:
  save_results: true
  results_dir: "./results"
  create_plots: true
  save_leaderboard: true

# Device configuration
device: "auto"  # Options: auto, cuda, mps, cpu

# Reproducibility
seed: 42
